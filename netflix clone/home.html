<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script src="https://kit.fontawesome.com/29476d3719.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="Home_style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <script src="home.js" defer></script>
</head>
<body>

    <div class="profile-picker">
        <span class="profile-picker__title">
            Who's watching?
        </span>
    
    <div class="profile-picker__list">
        <button class="profile">
            <img src="img/jinx_profile.png" alt="">
            <span class="profile__name">name</span>
        </button>
    
        <button class="profile">
            <img src="img/vi_profile.png" alt="">
            <span class="profile__name">name</span>
        </button> 
        
        <button class="profile">
            <img src="img/kids.png" alt="">
            <span class="profile__name">kids</span>    
        </button>    
        <button class="profile add-profile">
            <div class="add-icon">
                <div class="circle">
                    <i class="fa-solid fa-plus"></i>
                </div>
            </div>
            <span class="profile__name">Add profile</span>
        </button>
    </div>

    <button class="manage-profile">
        <span>Manage Profiles</span>
    </button>
    </div> 

</body>
</html>
